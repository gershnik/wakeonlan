name: Test

on: 
  push:
    branches: 
      - '*'
      - '*/**'
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'LICENSE.txt'
      - 'CHANGELOG.md'
      - '.github/workflows/release.yml'

jobs:
  matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: [
          "3.9", "3.10", "3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t",
          "pypy-3.9", "pypy-3.10", "pypy-3.11"]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # avoid setup-python noise on macOS
      - name: Clear pre-baked pip cache
        if: runner.os == 'macOS'
        run: rm -rf ~/Library/Caches/pip

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: ${{matrix.python-version}}

      - name: Install Nox
        run: pip install Nox

      - name: Test
        run: nox --sessions test --force-python ${{ steps.setup-python.outputs.python-path }}

